services:
  gateway:
    build: .
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
      - backend-service
  redis:
    image: redis:latest
    container_name: api-gateway-redis
    ports:
      - "6379:6379"
  
  backend-service:
    build: ./backend-service
    container_name: backend-service
    ports:
      - "8081:8081"
  
