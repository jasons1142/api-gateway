name: Go CI

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Set up Go
              uses: actions/setup-go@v5
              with: 
                go-version: "1.24"
            
            - name: Download Dependencies
              run: go mod download
            
            - name: Run go vet
              run: go vet ./...
            
            - name: Run tests
              run: go test ./...
            
            - name: Build project
              run: go build ./...